name: "🚀 Quality & Security Check"

# Le robot se lance à chaque "push" sur ton GitHub
on: [push, pull_request]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Récupérer le code"
        uses: actions/checkout@v4

      - name: "🐍 Configurer Python"
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: "🔍 Vérifier la qualité Python (Flake8)"
        run: |
          pip install flake8
          flake8 lambda/cleanup/handler.py lambda/metrics/handler.py --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: "🏗️ Configurer Terraform"
        uses: hashicorp/setup-terraform@v3

      - name: "📐 Vérifier le formatage Terraform"
        run: |
          terraform fmt -recursive -check -diff terraform/

      - name: "🤖 Valider Terraform"
        run: |
          cd terraform/environments/dev
          terraform init -backend=false
          terraform validate
